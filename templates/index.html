<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      padding: 40px 48px;
      width: 100%;
      max-width: 460px;
    }

    .card h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .card p.sub {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #444;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d0d7de;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a1a2e;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 26px;
      padding: 14px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover  { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }

    .logo {
      display: block;
      max-width: 180px;
      max-height: 70px;
      margin: 0 auto 18px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo" alt="DBS Packaging" class="logo" />
    <h1>QR Code Generator</h1>
    <p class="sub">Fill in the reel details and download the PDF.</p>

    <form method="POST" action="/generate">
      <div class="field">
        <label>Reel Number</label>
        <input type="text" name="reel" placeholder="A00001" required />
      </div>

      <div class="row2">
        <div class="field">
          <label>BF</label>
          <input type="text" name="bf" placeholder="18" required />
        </div>
        <div class="field">
          <label>GSM</label>
          <input type="text" name="gsm" placeholder="180" required />
        </div>
      </div>

      <div class="field">
        <label>Shade</label>
        <input type="text" name="shade" placeholder="NATURAL" required />
      </div>

      <div class="row2">
        <div class="field">
          <label>Size (mm)</label>
          <input type="text" name="size" placeholder="191" required />
        </div>
        <div class="field">
          <label>Weight (kg)</label>
          <input type="text" name="weight" placeholder="900" required />
        </div>
      </div>

      <button type="submit">&#8595; Generate &amp; Download PDF</button>
    </form>
  </div>
</body>
</html>
